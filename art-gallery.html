  <!-- ANIMATED SWIRL BACKGROUND -->
  <div class="swirl-layer">
    <svg viewBox="0 0 800 600">
      <defs>
        <!-- Light Mode Gradient -->
        <linearGradient id="lightSwirl" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#C89B2B" />
          <stop offset="50%" stop-color="#0B7C4A" />
          <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
        </linearGradient>

        <!-- Dark Mode Gradient -->
        <linearGradient id="darkSwirl" x1="0" y1="1" x2="1" y2="0">
          <stop offset="0%" stop-color="#5B2B9B" />
          <stop offset="50%" stop-color="#B57CFF" />
          <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
        </linearGradient>
      </defs>

      <!-- Swirl Shapes -->
      <path class="swirl-glow"
            d="M-40 120 C 160 -40 360 40 520 80"
            stroke="url(#lightSwirl)"
            stroke-width="80"
            fill="none" />

      <path class="swirl-glow"
            d="M-60 420 C 120 520 320 520 480 460"
            stroke="url(#darkSwirl)"
            stroke-width="70"
            fill="none" />

      <circle class="swirl-glow"
              cx="120" cy="480" r="80"
              fill="url(#darkSwirl)" />

      <circle class="swirl-glow"
              cx="640" cy="140" r="70"
              fill="url(#lightSwirl)" />
    </svg>
  </div>

  <!-- PAGE CONTENT -->
  <div class="page">
    <h1>Background Art Gallery</h1>
    <p class="subtitle">
      A collection of elegant, glowing swirl designs used throughout the site.
    </p>

    <div class="gallery-grid">

      <!-- GALLERY ITEM 1 -->
      <div class="gallery-item">
        <div class="gallery-label">Aurora Swirl</div>
      </div>

      <!-- GALLERY ITEM 2 -->
      <div class="gallery-item">
        <div class="gallery-label">Cosmic Loop</div>
      </div>

      <!-- GALLERY ITEM 3 -->
      <div class="gallery-item">
        <div class="gallery-label">Emerald Drift</div>
      </div>

      <!-- GALLERY ITEM 4 -->
      <div class="gallery-item">
        <div class="gallery-label">Violet Pulse</div>
      </div>

    </div>
  </div>

  <!-- Theme Toggle Script -->
  <script src="theme.js"></script>

</body>
